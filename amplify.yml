version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd app && npm ci
    build:
      commands:
        # 静的エクスポート時はAPI routeを除外
        - mv src/app/api src/app/_api_disabled
        - STATIC_EXPORT=true npm run build
        - mv src/app/_api_disabled src/app/api
  artifacts:
    baseDirectory: app/out
    files:
      - "**/*"
  cache:
    paths:
      - app/node_modules/**/*
